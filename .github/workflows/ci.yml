name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: campus_forum
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Initialize MySQL schema
        run: docker exec -i ${{ job.services.mysql.id }} mysql -uroot -proot < db/schema.sql
      - name: Start MinIO
        run: |
          docker run -d --name campus-minio-ci \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data

          for i in {1..30}; do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker logs campus-minio-ci
          exit 1
      - name: Run tests
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: ci
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: mvn test -Dspring.profiles.active=ci -Dtestcontainers.reuse.enable=false

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & test
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run test
          npm run build
