<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>发布帖子 - CampusForum</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#c2c6d6",

                        "surface": "#f8f9ff",
                        "on-secondary": "#ffffff",

                        "primary-fixed": "#d8e2ff",
                        "secondary-container": "#6cf8bb",
                        "inverse-primary": "#adc6ff",
                        "tertiary-container": "#b75b00",
                        "on-background": "#0b1c30",
                        "on-primary": "#ffffff",
                        "tertiary": "#924700",
                        "on-secondary-fixed": "#002113",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#fefcff",
                        "surface-variant": "#d3e4fe",
                        "primary-fixed-dim": "#adc6ff",
                        "primary-container": "#2170e4",
                        "background": "#f8f9ff",
                        "on-secondary-fixed-variant": "#005236",
                        "on-tertiary-fixed-variant": "#723600",
                        "tertiary-fixed": "#ffdcc6",
                        "on-secondary-container": "#00714d",
                        "secondary-fixed": "#6ffbbe",
                        "surface-container-low": "#eff4ff",
                        "on-error": "#ffffff",
                        "on-surface": "#0b1c30",
                        "inverse-surface": "#213145",
                        "error": "#ba1a1a",
                        "surface-tint": "#005ac2",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#311400",
                        "surface-bright": "#f8f9ff",
                        "surface-dim": "#cbdbf5",
                        "outline": "#727785",
                        "secondary-fixed-dim": "#4edea3",
                        "on-primary-fixed": "#001a42",
                        "surface-container-high": "#dce9ff",
                        "surface-container": "#e5eeff",
                        "on-primary-fixed-variant": "#004395",
                        "tertiary-fixed-dim": "#ffb786",
                        "inverse-on-surface": "#eaf1ff",
                        "primary": "#0058be",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "md": "24px",
                        "base": "4px",

                        "xl": "80px",
                        "container-max": "1200px",
                        "xs": "8px",
                        "margin-mobile": "16px",
                        "lg": "48px"
                    },
                    "fontFamily": {
                        "headline-md": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],

<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md">
<!-- Top Navigation (Suppressed based on rules for focused transactional screens, but instructed to implement all new sections leveraging shared components logic. Wait, the rule says: "Automatic Suppression: You MUST exclude the navigation shell if the page intent is: Linear/Transactional... Task-Focused: Any sub-page featuring a 'Close' or 'Back' action that implies a temporary departure...". Creating a post is a task-focused, temporary departure. I will suppress the main SideNav/TopNav and create a focused header with a 'Back/Cancel' action.) -->
<!-- Focused Header for Editor -->
<header class="bg-surface-container-lowest sticky top-0 z-50 shadow-sm px-gutter h-16 flex items-center justify-between border-b border-outline-variant/30">
<div class="flex items-center gap-sm">
<button class="p-xs text-on-surface-variant hover:text-primary transition-colors rounded-full hover:bg-surface-container">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<span class="font-headline-md text-headline-md text-primary font-bold">CampusForum</span>
<span class="text-outline mx-xs font-body-lg text-body-lg">/</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">发布新帖子</span>
</div>
<div class="flex gap-sm">
<button class="px-md py-xs rounded-full font-label-md text-label-md bg-surface-container-high text-on-surface hover:bg-surface-variant transition-colors">存草稿</button>
<button class="px-md py-xs rounded-full font-label-md text-label-md bg-primary text-on-primary hover:bg-surface-tint shadow-[0_4px_12px_rgba(33,112,228,0.2)] transition-all">发布</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex justify-center py-lg px-margin-mobile md:px-gutter">
<div class="w-full max-w-[800px] flex flex-col gap-lg">
<!-- Type Selector (Bento-style chips) -->
<section class="flex gap-md">
<button class="flex-1 bg-surface-container-lowest border-2 border-primary rounded-xl p-sm flex items-center gap-sm shadow-[0_4px_20px_rgba(0,0,0,0.02)] transition-transform active:scale-95">
<div class="w-10 h-10 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="article" data-weight="fill" style="font-variation-settings: 'FILL' 1;">article</span>
</div>
<div class="text-left">
<div class="font-label-md text-label-md text-on-surface">普通帖子</div>
<div class="font-label-sm text-label-sm text-on-surface-variant">分享观点与生活</div>
</div>
</button>
<button class="flex-1 bg-surface-container-lowest border-2 border-transparent hover:border-outline-variant rounded-xl p-sm flex items-center gap-sm shadow-[0_4px_20px_rgba(0,0,0,0.02)] transition-all active:scale-95">
<div class="w-10 h-10 rounded-full bg-surface-container-high text-on-surface flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="help_center">help_center</span>
</div>
<div class="text-left">
<div class="font-label-md text-label-md text-on-surface">悬赏问答</div>
<div class="font-label-sm text-label-sm text-on-surface-variant">悬赏求解学术问题</div>
</div>
</button>
</section>
<!-- Editor Core -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] p-md flex flex-col gap-md">
<!-- Title Input -->
<input class="w-full bg-transparent border-none outline-none font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface placeholder:text-outline focus:ring-0 px-0" placeholder="输入引人注目的标题..." type="text"/>
<hr class="border-outline-variant/30"/>
<!-- Toolbar -->
<div class="flex items-center gap-sm text-on-surface-variant flex-wrap">
<button class="p-xs rounded hover:bg-surface-container hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="format_bold">format_bold</span></button>
<button class="p-xs rounded hover:bg-surface-container hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="format_italic">format_italic</span></button>
<button class="p-xs rounded hover:bg-surface-container hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="format_h1">format_h1</span></button>
<button class="p-xs rounded hover:bg-surface-container hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="format_list_bulleted">format_list_bulleted</span></button>
<div class="w-px h-6 bg-outline-variant/30 mx-xs"></div>
<button class="p-xs rounded hover:bg-surface-container hover:text-primary transition-colors flex items-center gap-1">
<span class="material-symbols-outlined" data-icon="image">image</span>
<span class="font-label-sm text-label-sm hidden md:inline">图片</span>
</button>
<button class="p-xs rounded hover:bg-surface-container hover:text-primary transition-colors flex items-center gap-1">
<span class="material-symbols-outlined" data-icon="attach_file">attach_file</span>
<span class="font-label-sm text-label-sm hidden md:inline">附件</span>
</button>
<button class="p-xs rounded hover:bg-surface-container hover:text-primary transition-colors flex items-center gap-1">
<span class="material-symbols-outlined" data-icon="tag">tag</span>
<span class="font-label-sm text-label-sm hidden md:inline">话题</span>
</button>
</div>
<!-- Rich Text Area -->
<textarea class="w-full min-h-[300px] bg-transparent border-none outline-none font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant focus:ring-0 px-0 resize-y" placeholder="在这里写下你的想法，支持 Markdown..."></textarea>
<!-- Quoted Content Preview -->
<div class="bg-surface rounded-lg p-sm border-l-4 border-primary flex items-start gap-sm">
<span class="material-symbols-outlined text-outline" data-icon="format_quote">format_quote</span>
<div class="flex-grow">
<p class="font-body-md text-body-md text-on-surface-variant line-clamp-2">“高等数学第六版上册课后习题解析，哪位同学有整理好的PDF版本？主要需要第三章关于微分中值定理的那部分，万分感谢！”</p>
<div class="font-label-sm text-label-sm text-outline mt-xs">引用自 @张三 的求助帖</div>
</div>
<button class="text-outline hover:text-error transition-colors p-xs"><span class="material-symbols-outlined text-[18px]" data-icon="close">close</span></button>
</div>
</section>
<!-- Attachments & Tags Area -->
<section class="flex flex-col gap-sm">
<!-- Tags -->
<div class="flex flex-wrap gap-xs items-center">
<span class="material-symbols-outlined text-outline-variant" data-icon="sell">sell</span>
<div class="bg-primary-fixed text-on-primary-fixed font-label-sm text-label-sm px-3 py-1.5 rounded-full flex items-center gap-1">
                        #高等数学
                        <button class="hover:text-primary transition-colors"><span class="material-symbols-outlined text-[14px]" data-icon="close">close</span></button>
</div>
<div class="bg-surface-container-high text-on-surface-variant font-label-sm text-label-sm px-3 py-1.5 rounded-full flex items-center gap-1 border border-dashed border-outline-variant cursor-pointer hover:border-primary hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[14px]" data-icon="add">add</span> 添加话题标签
                    </div>
</div>
<!-- Attachments Grid (Bento) -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-sm mt-sm">
<!-- Image Attachment -->
<div class="relative group rounded-lg overflow-hidden h-24 bg-surface-container border border-outline-variant/30">
<div class="absolute inset-0 bg-gradient-to-tr from-surface-variant to-primary-container opacity-20"></div>
<div class="absolute inset-0 flex flex-col items-center justify-center p-2 text-center z-10">
<span class="material-symbols-outlined text-on-surface-variant mb-1" data-icon="image">image</span>
<span class="font-label-sm text-label-sm text-on-surface-variant truncate w-full">notes_p1.jpg</span>
</div>
<button class="absolute top-1 right-1 bg-surface-container-lowest/80 text-on-surface p-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-20 hover:bg-error hover:text-on-error"><span class="material-symbols-outlined text-[14px]" data-icon="delete">delete</span></button>
</div>
<!-- PDF Attachment -->
<div class="relative group rounded-lg overflow-hidden h-24 bg-surface-container border border-outline-variant/30">
<div class="absolute inset-0 flex flex-col items-center justify-center p-2 text-center z-10">
<span class="material-symbols-outlined text-error mb-1" data-icon="picture_as_pdf">picture_as_pdf</span>
<span class="font-label-sm text-label-sm text-on-surface-variant truncate w-full">calculus_ch3.pdf</span>
</div>
<button class="absolute top-1 right-1 bg-surface-container-lowest/80 text-on-surface p-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-20 hover:bg-error hover:text-on-error"><span class="material-symbols-outlined text-[14px]" data-icon="delete">delete</span></button>
</div>
<!-- Add Attachment Button -->
<button class="rounded-lg h-24 bg-surface border-2 border-dashed border-outline-variant hover:border-primary hover:bg-surface-container-low transition-colors flex flex-col items-center justify-center text-on-surface-variant hover:text-primary">
<span class="material-symbols-outlined mb-1" data-icon="upload_file">upload_file</span>
<span class="font-label-sm text-label-sm">上传附件</span>
</button>
</div>
</section>
</div>
</main>
<!-- Footer (Suppressed for focused editor view, maintaining clean canvas) -->
</body></html>
