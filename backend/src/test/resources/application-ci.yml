# CI 环境测试配置 — 直接使用 GitHub Actions service containers
# 不使用 Testcontainers，直接连接 CI 提供的 MySQL 和 Redis

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_forum?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: ""

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: tik
  is-log: false

tenant:
  mode: standalone
  standalone-tenant-id: 1
  root-domain: test.local
  allow-header-fallback: true
  cache:
    max-size: 128
    ttl: 10s

ai:
  provider: mock
  base-url: http://localhost
  api-key: test-key
  model: mock
  rate-limit:
    per-user-per-min: 100
    per-tenant-per-day: 10000

storage:
  type: minio
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: test-bucket

search:
  type: mysql

upload:
  max-file-size: 10MB
  allowed-extensions: pdf,jpg,png
