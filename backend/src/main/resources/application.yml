server:
  port: 8080

spring:
  application:
    name: campus-forum
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/campus_forum?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:123456}
  websocket:
    endpoint:
      path: /ws/notify

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: tik
  is-log: false

# ---------- 多租户配置 ----------
# standalone 模式：所有请求使用固定 tenant_id，适用于单校部署，无需子域名配置
# multi 模式：通过子域名（如 fudan.campusforum.com）或 X-Tenant-Id 头识别租户，适用于 SaaS 多校部署
tenant:
  mode: standalone               # standalone | multi
  standalone-tenant-id: 1        # standalone 模式占位 id（必须等于 tenants 表中 status=1 的某条记录）
  root-domain: campusforum.com   # multi 模式子域名解析依据（如 fudan.campusforum.com）
  allow-header-fallback: true    # multi 模式是否接受 X-Tenant-Id 作为 auth 接口的回退来源
  cache:
    max-size: 1024               # Active 租户缓存最大条目数
    ttl: 60s                     # 缓存过期时间（写入后）

# ---------- AI 配置 ----------
ai:
  provider: mock  # openai | ollama | mock
  base-url: https://api.deepseek.com/v1
  api-key: ${AI_API_KEY:}
  model: deepseek-chat
  rate-limit:
    per-user-per-min: 5
    per-tenant-per-day: 1000

# ---------- 存储配置 ----------
storage:
  type: minio  # minio | oss
  minio:
    endpoint: http://localhost:9000
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: campusforum

# ---------- 搜索配置 ----------
search:
  type: meilisearch  # meilisearch | mysql
  meilisearch:
    host: http://localhost:7700
    api-key: ${MEILI_MASTER_KEY:masterKey}

# ---------- 学号自动识别 ----------
student-no:
  mapping:
    - prefix: "20241001"
      college: "计算机学院"
      major: "计算机科学与技术"
      grade: "2024级"
    - prefix: "20241002"
      college: "计算机学院"
      major: "软件工程"
      grade: "2024级"
    - prefix: "20241101"
      college: "信息工程学院"
      major: "通信工程"
      grade: "2024级"
    - prefix: "20241201"
      college: "数学学院"
      major: "数学与应用数学"
      grade: "2024级"

# ---------- 文件上传 ----------
upload:
  max-file-size: 50MB
  allowed-extensions: pdf,doc,docx,ppt,pptx,xls,xlsx,zip,rar,7z,jpg,jpeg,png,gif,webp

# ---------- 管理端点 ----------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
