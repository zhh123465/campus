server:
  port: 8080

spring:
  application:
    name: campus-forum
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/campus_forum?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  websocket:
    endpoint:
      path: /ws/notify

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: tik
  is-log: false

# ---------- 多租户配置 ----------
tenant:
  mode: standalone  # standalone | multi

# ---------- AI 配置 ----------
ai:
  provider: mock  # openai | ollama | mock
  base-url: https://api.deepseek.com/v1
  api-key: ${AI_API_KEY:}
  model: deepseek-chat
  rate-limit:
    per-user-per-min: 5
    per-tenant-per-day: 1000

# ---------- 存储配置 ----------
storage:
  type: minio  # minio | oss
  minio:
    endpoint: http://localhost:9000
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: campusforum

# ---------- 搜索配置 ----------
search:
  type: meilisearch  # meilisearch | mysql
  meilisearch:
    host: http://localhost:7700
    api-key: ${MEILI_MASTER_KEY:masterKey}

# ---------- 文件上传 ----------
upload:
  max-file-size: 50MB
  allowed-extensions: pdf,doc,docx,ppt,pptx,xls,xlsx,zip,rar,7z,jpg,jpeg,png,gif,webp

# ---------- 管理端点 ----------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
