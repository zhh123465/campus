# ===== 开发环境配置 =====
server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_forum?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456

logging:
  level:
    com.campusforum: DEBUG
    org.springframework.security: DEBUG

# 开发环境使用 mock AI
ai:
  provider: mock

# 开发环境使用 MySQL FULLTEXT 搜索（无需启动 MeiliSearch）
search:
  type: mysql

# 开发环境使用本地文件存储
storage:
  type: local
  local:
    path: ./uploads
